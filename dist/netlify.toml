[build]
  publish = "dist"
  command = ""

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://tailormed-tracking-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/design"
  to = "/Projects/TailorMed/track/design_ui.html"
  status = 200

[[redirects]]
  from = "/basic"
  to = "https://tailormed-tracking-api.onrender.com/basic"
  status = 200

[[redirects]]
  from = "/standard"
  to = "https://tailormed-tracking-api.onrender.com/standard"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
