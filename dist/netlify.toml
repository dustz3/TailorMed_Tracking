[build]
  publish = "dist/Projects/TailorMed/track"
  command = ""

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "https://tailormed-tracking-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/design"
  to = "/design_ui.html"
  status = 200

[[redirects]]
  from = "/basic"
  to = "https://tailormed-tracking-api.onrender.com/basic"
  status = 200

[[redirects]]
  from = "/standard"
  to = "https://tailormed-tracking-api.onrender.com/standard"
  status = 200